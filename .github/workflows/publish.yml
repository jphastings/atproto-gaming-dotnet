name: Publish

on:
  push:
    branches: [main]
    paths: ['src/ByJP.AtprotoGaming.Core/ByJP.AtprotoGaming.Core.csproj'] # publish on a <Version> change
  workflow_dispatch:

# Trusted Publishing: mint a short-lived nuget.org key via OIDC — no stored API key.
permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: 9.0.x

      # Don't publish a broken package.
      - name: Test
        run: dotnet test ByJP.AtprotoGaming.Core.sln -c Release

      - name: Pack
        run: |
          dotnet pack src/ByJP.AtprotoGaming.Core/ByJP.AtprotoGaming.Core.csproj \
            -c Release -p:ContinuousIntegrationBuild=true -o artifacts

      # Exchange the GitHub OIDC token for a 1-hour nuget.org key. Requires a Trusted
      # Publishing policy on nuget.org (owner=jphastings, repo=atproto-gaming-dotnet,
      # workflow=publish.yml). `user` is your nuget.org profile name (not your email);
      # it isn't a credential, just kept out of the file via the NUGET_USER variable.
      - name: NuGet login (OIDC → temp key)
        id: login
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1
        with:
          user: ${{ secrets.NUGET_USER }}

      # nuget.org versions are immutable; --skip-duplicate makes a re-run (or a push that
      # didn't bump <Version>) a harmless no-op. The .snupkg beside the .nupkg goes too.
      - name: Push to nuget.org
        run: |
          dotnet nuget push "artifacts/*.nupkg" \
            --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
